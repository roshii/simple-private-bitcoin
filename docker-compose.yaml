secrets:
  yg-wallet-pwd:
    file: ${JM_WALLET_NAME:-.secrets/yg-wallet-pwd}
    name: yg-wallet-pwd

services:
  tor:
    build:
      context: tor
    container_name: tor
    image: tor
    networks:
      - private
    volumes:
      - tor:/var/lib/tor
    restart: unless-stopped
  bitcoin:
    build:
      args:
        bitcoin_version_tag: ${BITCOIN_VERION_TAG:-v22.0}
      context: bitcoin
    container_name: bitcoin
    depends_on:
      - tor
    image: bitcoin
    networks:
      - private
    volumes:
        - bitcoin:/var/lib/bitcoin
        - tor:/var/lib/tor:ro
        - ${BITCOIN_BLOCKS_MOUNTPOINT:-.data/bitcoin/blocks}:/srv/blocks
        - ${BITCOIN_DATA_MOUNTPOINT:-.data/bitcoin/data}:/srv/data
        - ${BITCOIN_WALLET_MOUNTPOINT:-.data/bitcoin/wallet}:/srv/wallet
    restart: unless-stopped
  joinmarket:
    build:
      args:
        JM_version_tag: ${JM_VERION_TAG:-v0.9.5}
      context: joinmarket
    command: >
      yg-privacyenhanced.py
      ${JM_WALLET_NAME:-wallet.jmdat}
    container_name: joinmarket
    depends_on:
      - bitcoin
    image: joinmarket
    secrets:
      - yg-wallet-pwd
    networks:
      - private
    volumes:
      - bitcoin:/var/lib/bitcoin:ro
      - ${JM_DATA_MOUNTPOINT:-.data/joinmarket}:/srv

networks:
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 10.3.1.0/24

volumes:
  tor:
  bitcoin:
